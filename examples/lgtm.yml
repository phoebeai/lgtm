version: 1
defaults:
  model: gpt-5.3-codex
  effort: xhigh
reviewers:
  - id: security
    display_name: Security
    prompt_file: examples/prompts/default/security.md
    scope: security risk
  - id: test_quality
    display_name: Test Quality
    prompt_file: examples/prompts/default/test-quality.md
    scope: test quality and coverage risk
  - id: infrastructure
    display_name: Infrastructure
    prompt_file: examples/prompts/default/infrastructure.md
    scope: infrastructure and deployment risk
    paths:
      - src/infrastructure/**
      - src/**/migrations/**
      - compose*.yaml
  - id: code_quality
    display_name: Code Quality
    prompt_file: examples/prompts/default/code-quality.md
    scope: maintainability and architecture quality risk
