name: PR Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  lgtm:
    uses: phoebeai/lgtm/.github/workflows/lgtm.yml@v1
    with:
      config_path: .github/lgtm.yml
      publish_comment: true
      publish_inline_comments: true
      enforce_gate: true
      auto_approve_no_findings: true
    secrets:
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      github_app_id: ${{ secrets.LGTM_GITHUB_APP_ID }}
      github_app_private_key: ${{ secrets.LGTM_GITHUB_APP_PRIVATE_KEY }}
