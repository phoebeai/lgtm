name: Dogfood

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to run dogfood review against.
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  parse_lgtm_rerun:
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      should_rerun: ${{ steps.command.outputs.should_rerun }}
      pr_number: ${{ steps.command.outputs.pr_number }}
      reviewer_filter: ${{ steps.command.outputs.reviewer_filter }}
    steps:
      - name: Checkout workflow source repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Parse LGTM rerun command
        id: command
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          PYTHONPATH: ${{ github.workspace }}
        run: python3 -m scripts.parse_lgtm_rerun_command

  dogfood:
    needs: [parse_lgtm_rerun]
    if: >-
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name != 'pull_request' &&
      github.event_name != 'workflow_dispatch' &&
      needs.parse_lgtm_rerun.outputs.should_rerun == 'true') ||
      github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/lgtm.yml
    with:
      workflow_source_repository: ${{ github.repository }}
      workflow_source_ref: ${{ github.sha }}
      config_path: examples/lgtm.yml
      reviewer_timeout_minutes: 5
      publish_comment: true
      publish_inline_comments: true
      enforce_gate: true
      auto_approve_no_findings: true
      sticky_comment_trusted_owners: phoebe-lgtm
      pull_request_number: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.pull_request_number ||
          (github.event_name != 'pull_request' && needs.parse_lgtm_rerun.outputs.pr_number != '' && fromJson(needs.parse_lgtm_rerun.outputs.pr_number)) ||
          0
        }}
      reviewer_filter: ${{ github.event_name != 'pull_request' && github.event_name != 'workflow_dispatch' && needs.parse_lgtm_rerun.outputs.reviewer_filter || '' }}
    secrets: inherit
