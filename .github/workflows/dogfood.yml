name: Dogfood

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to run dogfood review against.
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  dogfood:
    if: >-
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment' ||
      github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/lgtm.yml
    with:
      workflow_source_repository: ${{ github.repository }}
      workflow_source_ref: ${{ github.sha }}
      caller_event_name: ${{ github.event_name }}
      comment_body: ${{ github.event.comment.body || '' }}
      comment_author_association: ${{ github.event.comment.author_association || '' }}
      comment_user_type: ${{ github.event.comment.user.type || '' }}
      comment_issue_number: ${{ github.event_name == 'issue_comment' && github.event.issue.number || 0 }}
      comment_issue_is_pull_request: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request != null }}
      comment_review_pr_number: ${{ github.event_name == 'pull_request_review_comment' && github.event.pull_request.number || 0 }}
      config_path: examples/lgtm.yml
      reviewer_timeout_minutes: 5
      publish_comment: true
      publish_inline_comments: true
      enforce_gate: true
      auto_approve_no_findings: true
      sticky_comment_trusted_owners: phoebe-lgtm
      pull_request_number: ${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || 0 }}
    secrets: inherit
