name: LGTM

on:
  workflow_call:
    inputs:
      workflow_source_repository:
        description: Repository containing LGTM workflow scripts.
        required: false
        type: string
        default: phoebeai/lgtm
      workflow_source_ref:
        description: Ref in workflow_source_repository containing LGTM workflow scripts.
        required: false
        type: string
        default: v1
      caller_event_name:
        description: Event name from the caller workflow.
        required: false
        type: string
        default: ""
      comment_body:
        description: Comment body from the caller event.
        required: false
        type: string
        default: ""
      comment_author_association:
        description: Comment author association from the caller event.
        required: false
        type: string
        default: ""
      comment_user_type:
        description: Comment author user type from the caller event.
        required: false
        type: string
        default: ""
      comment_issue_number:
        description: Issue number from an issue_comment event.
        required: false
        type: number
        default: 0
      comment_issue_is_pull_request:
        description: Whether an issue_comment event belongs to a pull request.
        required: false
        type: boolean
        default: false
      comment_review_pr_number:
        description: Pull request number from a pull_request_review_comment event.
        required: false
        type: number
        default: 0
      config_path:
        description: Path to repository-local LGTM config file.
        required: false
        type: string
        default: .github/lgtm.yml
      pull_request_number:
        description: Pull request number to review when caller is not a pull_request event.
        required: false
        type: number
        default: 0
      reviewer_filter:
        description: Optional reviewer id to rerun while preserving prior results for other reviewers.
        required: false
        type: string
        default: ""
      model:
        description: Override model for all reviewers. Empty uses config/default.
        required: false
        type: string
        default: ""
      publish_comment:
        description: Whether to upsert a sticky PR comment.
        required: false
        type: boolean
        default: true
      publish_inline_comments:
        description: Whether to publish line-bound findings as inline PR comments.
        required: false
        type: boolean
        default: true
      enforce_gate:
        description: Whether to fail the workflow when consensus outcome is FAIL.
        required: false
        type: boolean
        default: true
      reviewer_timeout_minutes:
        description: Timeout for each reviewer execution.
        required: false
        type: number
        default: 10
      auto_approve_no_findings:
        description: When true, submit an APPROVE review on PASS_NO_FINDINGS outcomes.
        required: false
        type: boolean
        default: false
      sticky_comment_trusted_owners:
        description: Optional allowlist of sticky comment owners (space/comma separated logins).
        required: false
        type: string
        default: ""
    secrets:
      openai_api_key:
        description: OpenAI API key for Codex reviewer execution.
        required: true
      lgtm_github_app_id:
        description: GitHub App ID used to mint an installation token in this job.
        required: true
      lgtm_github_app_private_key:
        description: GitHub App private key used to mint an installation token in this job.
        required: true

concurrency:
  group: lgtm-${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pull_request_number || inputs.comment_review_pr_number || inputs.comment_issue_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  lgtm:
    name: LGTM
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/workflow-src
    steps:
      - name: Resolve workflow source checkout target
        id: workflow_source
        env:
          INPUT_WORKFLOW_SOURCE_REPOSITORY: ${{ inputs.workflow_source_repository }}
          INPUT_WORKFLOW_SOURCE_REF: ${{ inputs.workflow_source_ref }}
        run: |
          workflow_repository="$INPUT_WORKFLOW_SOURCE_REPOSITORY"
          workflow_ref="$INPUT_WORKFLOW_SOURCE_REF"

          if [[ -z "$workflow_repository" ]]; then
            echo "workflow_source_repository input cannot be empty." >&2
            exit 1
          fi

          if [[ -z "$workflow_ref" ]]; then
            echo "workflow_source_ref input cannot be empty." >&2
            exit 1
          fi

          {
            echo "workflow_repository=$workflow_repository"
            echo "workflow_ref=$workflow_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workflow source repository
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.workflow_source.outputs.workflow_repository }}
          ref: ${{ steps.workflow_source.outputs.workflow_ref }}
          path: workflow-src
          fetch-depth: 1
          persist-credentials: false

      - name: Parse comment trigger
        id: comment_trigger
        env:
          CALLER_EVENT_NAME: ${{ inputs.caller_event_name }}
          COMMENT_BODY: ${{ inputs.comment_body }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ inputs.comment_author_association }}
          COMMENT_USER_TYPE: ${{ inputs.comment_user_type }}
          COMMENT_ISSUE_NUMBER: ${{ inputs.comment_issue_number }}
          COMMENT_ISSUE_IS_PULL_REQUEST: ${{ inputs.comment_issue_is_pull_request }}
          COMMENT_REVIEW_PR_NUMBER: ${{ inputs.comment_review_pr_number }}
        run: python3 -m scripts.parse_lgtm_rerun_command

      - name: Skip non-triggering comment event
        if: ${{ steps.comment_trigger.outputs.should_run != 'true' }}
        run: echo "Skipping LGTM run because this comment did not request /lgtm rerun."

      - name: Setup uv
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: setup_uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Mint GitHub App installation token
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: github_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.lgtm_github_app_id }}
          private-key: ${{ secrets.lgtm_github_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-actions: read
          permission-contents: read
          permission-pull-requests: write

      - name: Resolve pull request metadata
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          CALLER_EVENT_NAME: ${{ inputs.caller_event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_PR_NUMBER: ${{ inputs.pull_request_number }}
          PARSED_PR_NUMBER: ${{ steps.comment_trigger.outputs.pr_number }}
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
        run: uv run --project workflow-src python -m scripts.resolve_pull_request_metadata

      - name: Checkout pull request merge ref
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.pr_number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Refresh workflow source repository
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.workflow_source.outputs.workflow_repository }}
          ref: ${{ steps.workflow_source.outputs.workflow_ref }}
          path: workflow-src
          fetch-depth: 1
          persist-credentials: false

      - name: Install workflow dependencies
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        working-directory: workflow-src
        run: uv sync --all-groups

      - name: Load trusted review config
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: config
        env:
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          CONFIG_REL: ${{ inputs.config_path }}
          INPUT_MODEL: ${{ inputs.model }}
          FALLBACK_MODEL: gpt-5.3-codex
        run: uv run --project workflow-src python -m scripts.load_trusted_review_config

      - name: Find prior ledger artifact run
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: prior_ledger_run
        env:
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: uv run --project workflow-src python -m scripts.find_prior_ledger_run

      - name: Download prior ledger artifact
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' && steps.prior_ledger_run.outputs.prior_run_id != '' }}
        uses: actions/download-artifact@v6
        with:
          name: ${{ steps.prior_ledger_run.outputs.prior_artifact_name }}
          run-id: ${{ steps.prior_ledger_run.outputs.prior_run_id }}
          github-token: ${{ steps.github_token.outputs.token }}
          path: ${{ runner.temp }}/lgtm-prior-artifact

      - name: Prepare prior ledger
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: prior_ledger
        env:
          PRIOR_ARTIFACT_DIR: ${{ runner.temp }}/lgtm-prior-artifact
          PRIOR_LEDGER_JSON: ${{ runner.temp }}/lgtm-prior-ledger.json
        run: uv run --project workflow-src python -m scripts.prepare_prior_ledger

      - name: Run reviewers
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.openai_api_key }}
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
          REVIEWERS_JSON: ${{ steps.config.outputs.reviewers_json }}
          RESOLVED_MODEL: ${{ steps.config.outputs.resolved_model }}
          MAX_CHANGED_LINES: ${{ steps.config.outputs.max_changed_lines }}
          SCHEMA_FILE: ${{ github.workspace }}/workflow-src/schemas/reviewer-output.schema.json
          PROMPTS_DIR: ${{ runner.temp }}/lgtm-prompts
          REPORTS_DIR: ${{ runner.temp }}/lgtm-reports
          PRIOR_LEDGER_JSON: ${{ steps.prior_ledger.outputs.prior_ledger_json }}
          PRIOR_ARTIFACT_DIR: ${{ runner.temp }}/lgtm-prior-artifact
          REVIEWER_FILTER: ${{ steps.comment_trigger.outputs.reviewer_filter || inputs.reviewer_filter }}
          REVIEWER_TIMEOUT_MINUTES: ${{ inputs.reviewer_timeout_minutes }}
          WORKSPACE_DIR: ${{ github.workspace }}
        run: uv run --project workflow-src python -m scripts.run_reviewers_parallel

      - name: Compute pass/fail consensus
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' }}
        id: consensus
        env:
          REPORTS_DIR: ${{ runner.temp }}/lgtm-reports
          REVIEWERS_JSON: ${{ steps.config.outputs.reviewers_json }}
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          SHA: ${{ steps.pr.outputs.head_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          WORKSPACE_DIR: ${{ github.workspace }}
          COMMENT_PATH: ${{ runner.temp }}/lgtm-comment.md
          LEDGER_PATH: ${{ runner.temp }}/lgtm-findings-ledger.json
          PUBLISH_INLINE_COMMENTS: ${{ inputs.publish_inline_comments }}
          PRIOR_LEDGER_JSON: ${{ steps.prior_ledger.outputs.prior_ledger_json }}
        run: uv run --project workflow-src python -m scripts.consensus

      - name: Dismiss prior LGTM bot approvals when failing
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' && always() && steps.consensus.outputs.outcome != '' && steps.consensus.outputs.outcome != 'PASS' }}
        env:
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          SHA: ${{ steps.pr.outputs.head_sha }}
          APP_SLUG: ${{ steps.github_token.outputs.app-slug }}
        run: uv run --project workflow-src python -m scripts.dismiss_bot_approvals_on_failure

      - name: Auto-approve PR when no findings
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' && always() && inputs.auto_approve_no_findings && steps.consensus.outputs.outcome_reason == 'PASS_NO_FINDINGS' }}
        env:
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          SHA: ${{ steps.pr.outputs.head_sha }}
        run: uv run --project workflow-src python -m scripts.approve_pr_when_clean

      - name: Persist consensus artifacts
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' && always() && steps.consensus.outputs.comment_path != '' && steps.consensus.outputs.ledger_path != '' }}
        env:
          REVIEWERS_JSON: ${{ steps.config.outputs.reviewers_json }}
          CONSENSUS_REPORTS: ${{ steps.consensus.outputs.reports_json }}
          OUTCOME: ${{ steps.consensus.outputs.outcome }}
          OPEN_FINDINGS_COUNT: ${{ steps.consensus.outputs.open_findings_count }}
          REVIEWER_ERRORS_COUNT: ${{ steps.consensus.outputs.reviewer_errors_count }}
          COMMENT_PATH: ${{ steps.consensus.outputs.comment_path }}
          LEDGER_PATH: ${{ steps.consensus.outputs.ledger_path }}
        run: uv run --project workflow-src python -m scripts.persist_consensus_artifacts

      - name: Upload LGTM artifact
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' && always() }}
        uses: actions/upload-artifact@v6
        with:
          name: lgtm-${{ github.run_id }}
          path: ${{ runner.temp }}/lgtm/
          retention-days: 14

      - name: Upsert sticky PR comment
        if: ${{ steps.comment_trigger.outputs.should_run == 'true' && always() && inputs.publish_comment && steps.consensus.outputs.comment_path != '' }}
        env:
          GITHUB_TOKEN: ${{ steps.github_token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMENT_PATH: ${{ steps.consensus.outputs.comment_path }}
          STICKY_COMMENT_TRUSTED_OWNERS: ${{ inputs.sticky_comment_trusted_owners }}
        run: uv run --project workflow-src python -m scripts.upsert_pr_comment

      - name: Enforce LGTM gate
        if: ${{ always() && inputs.enforce_gate && steps.consensus.outputs.outcome != '' }}
        run: |
          if [[ "${{ steps.consensus.outputs.outcome }}" != "PASS" ]]; then
            echo "LGTM outcome is ${{ steps.consensus.outputs.outcome }}; failing workflow by policy."
            exit 1
          fi
